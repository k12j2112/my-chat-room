<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>双人聊天室 - GoEasy</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 600px; margin: 20px auto; padding: 0 12px; }
    h2 { text-align: center; margin-bottom: 12px; color: #333; }
    #chat-box { 
      border: 1px solid #d0d0d0; border-radius: 10px; height: 400px; overflow-y: auto;
      padding: 12px; background: #f8f9fa; margin-bottom: 12px;
    }
    .msg { margin-bottom: 10px; display: flex; }
    .msg.mine { justify-content: flex-end; }
    .msg-bubble {
      max-width: 75%; padding: 8px 14px; border-radius: 18px; line-height: 1.4;
      word-break: break-word; box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
    .mine .msg-bubble { background: #b2e281; color: #1a1a1a; border-bottom-right-radius: 4px; }
    .others .msg-bubble { background: #ffffff; color: #1a1a1a; border-bottom-left-radius: 4px; border: 1px solid #e9e9e9; }
    .input-area { display: flex; gap: 8px; }
    input[type="text"] {
      flex: 1; padding: 10px 12px; border-radius: 20px; border: 1px solid #ccc;
      font-size: 15px; outline: none;
    }
    button {
      padding: 10px 18px; border-radius: 20px; border: none; background: #1677ff;
      color: white; font-size: 15px; cursor: pointer; transition: background 0.2s;
    }
    button:active { background: #0958d9; }
    .status { font-size: 13px; color: #888; text-align: center; margin-bottom: 8px; }
  </style>
</head>
<body>

  <h2>💬 双人聊天室</h2>
  <div class="status" id="status">正在连接...</div>
  <div id="chat-box"></div>
  <div class="input-area">
    <input type="text" id="user-input" placeholder="输入消息，按回车发送..." autofocus>
    <button id="send-btn">发送</button>
  </div>

  <!-- 引入 GoEasy SDK -->
  <script src="https://cdn.goeasy.io/2.x/goeasy.js"></script>
  <script>
    // ========== 配置区：替换为你自己的 AppKey ==========
    const APP_KEY = 'BC-b00e814da29b4eef805fa77b26501d1b';  // 从 GoEasy 控制台获取

    // 生成一个随机的临时用户标识（也可改成自定义昵称输入）
    const randomId = Math.random().toString(36).substr(2, 6);
    const userId = 'user_' + randomId;
    const nickname = userId;  // 简单用 ID 作为昵称，可自行修改

    // 聊天通道名，两人必须使用同一个 channel 才能通信
    const CHANNEL = 'my_chat_room_001';  // 可改成你们约定的房间名

    // 初始化 GoEasy
    const goEasy = GoEasy.getInstance({
      host: 'hangzhou.goeasy.io',  // 国内杭州节点，连接更快
      appkey: APP_KEY,
      modules: ['pubsub']
    });

    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const statusDiv = document.getElementById('status');

    // 显示一条消息到聊天框
    function addMessage(text, senderId) {
      const isMine = (senderId === userId);
      const msgDiv = document.createElement('div');
      msgDiv.className = 'msg ' + (isMine ? 'mine' : 'others');
      msgDiv.innerHTML = `<div class="msg-bubble">${escapeHtml(text)}</div>`;
      chatBox.appendChild(msgDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    // 发送消息
    function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;
      
      // 1. 自己在本地显示
      addMessage(text, userId);
      
      // 2. 通过 GoEasy 发送到对方
      goEasy.publish({
        channel: CHANNEL,
        message: JSON.stringify({
          senderId: userId,
          text: text,
          timestamp: Date.now()
        }),
        onSuccess: () => {
          console.log('发送成功');
        },
        onFailed: (error) => {
          alert('发送失败: ' + error.message);
          // 可考虑重发或提示
        }
      });
      
      userInput.value = '';
      userInput.focus();
    }

    // 收到对方的消息
    goEasy.subscribe({
      channel: CHANNEL,
      onMessage: (message) => {
        try {
          const data = JSON.parse(message.content);
          // 不处理自己发出的消息（因为发送时已在本地渲染了）
          if (data.senderId !== userId) {
            addMessage(data.text, data.senderId);
          }
        } catch (e) {
          // 纯文本消息兼容
          addMessage(message.content, 'unknown');
        }
      },
      onSuccess: () => {
        statusDiv.textContent = '✅ 已连接，把此链接分享给对方即可开始聊天';
      },
      onFailed: (error) => {
        statusDiv.textContent = '❌ 连接失败: ' + error.message;
      }
    });

    // 工具：防 XSS
    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // 事件绑定
    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

  </script>
</body>
</html>
